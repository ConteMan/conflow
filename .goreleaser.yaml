version: 2

project_name: conflow

before:
  hooks:
    - go run ./cmd/embedui

builds:
  - id: conflow
    main: ./cmd/conflow
    binary: conflow
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: archive
    ids: [conflow]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [LICENSE, README.md, README.en.md, CHANGELOG.md]

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: desc

release:
  github:
    owner: ConteMan
    name: conflow
  name_template: "{{ .Tag }}"
  prerelease: auto
