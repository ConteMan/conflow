openapi: 3.1.0
info:
  title: Conflow Local API
  version: 0.8.0
  description: |
    Versioned same-origin API between the embedded React GUI and the local Go service.
servers:
  - url: /api/v1
    description: Same-origin local Conflow service
paths:
  /health:
    get:
      operationId: getHealth
      summary: Check service health and the loaded project
      responses:
        "200":
          description: Service is ready
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: The project manifest is temporarily unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /bootstrap:
    get:
      operationId: getBootstrap
      summary: Load the GUI bootstrap context
      responses:
        "200":
          description: Bootstrap context
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapResponse"
  /source:
    get:
      operationId: getSource
      summary: Get the active source adapter and its capabilities
      responses:
        "200":
          description: Active source adapter
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        "500":
          description: Source is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /source/status:
    get:
      operationId: getSourceStatus
      summary: Get the active source digest and managed file status
      responses:
        "200":
          description: Source status without credentials
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceStatusResponse"
        "500":
          description: Source is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /source:inspect:
    post:
      operationId: inspectSource
      summary: Detect the Git workspace and validate the active mapping profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceInspectInput"
      responses:
        "200":
          description: Git workspace and profile match report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceInspectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /source:import:
    post:
      operationId: importSource
      summary: Import Git JSON mapped entities into a target environment draft
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceImportInput"
      responses:
        "200":
          $ref: "#/components/responses/DraftMutationSucceeded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /source:preview-save:
    post:
      operationId: previewSourceSave
      summary: Preview Git JSON file diffs before a draft is saved
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourcePreviewSaveInput"
      responses:
        "200":
          description: Per-file source diff and current source digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcePreviewSaveResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /git/status:
    get:
      operationId: getGitReviewStatus
      summary: Get local Git review status and declared managed files
      responses:
        "200":
          description: Current local Git review status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitReviewStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /git:prepare:
    post:
      operationId: prepareGitReview
      summary: Generate a read-only Git review artifact and suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitPrepareInput"
      responses:
        "200":
          description: Read-only Git review artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitPrepareResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /git:create-branch:
    post:
      operationId: createGitReviewBranch
      summary: Create one explicitly named local Git branch
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitCreateBranchInput"
      responses:
        "200":
          description: Created or idempotently replayed branch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitCreateBranchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/StateConflict"
  /git:commit:
    post:
      operationId: commitGitReviewFiles
      summary: Stage and commit explicitly listed declared managed files
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitCommitInput"
      responses:
        "200":
          description: Created or idempotently replayed local commit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitCommitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/StateConflict"
  /project:
    get:
      operationId: getProject
      summary: Get the loaded project
      responses:
        "200":
          description: Project
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
    put:
      operationId: updateProject
      summary: Replace editable project metadata
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectInput"
      responses:
        "200":
          description: Updated project
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "412":
          $ref: "#/components/responses/ManifestRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /environments:
    get:
      operationId: listEnvironments
      summary: List project environments
      responses:
        "200":
          description: Environments
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentsResponse"
    post:
      operationId: createEnvironment
      summary: Create an environment
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnvironmentInput"
      responses:
        "201":
          description: Created environment
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/StateConflict"
        "412":
          $ref: "#/components/responses/ManifestRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /environments/{environment_id}:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    get:
      operationId: getEnvironment
      summary: Get an environment
      responses:
        "200":
          description: Environment
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateEnvironment
      summary: Replace an environment without changing its ID
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEnvironmentInput"
      responses:
        "200":
          description: Updated environment
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/ManifestRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
    delete:
      operationId: deleteEnvironment
      summary: Delete an environment
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: Deleted environment ID
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEnvironmentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/StateConflict"
        "403":
          $ref: "#/components/responses/Forbidden"
        "412":
          $ref: "#/components/responses/ManifestRevisionMismatch"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /packs:
    get:
      operationId: listPacks
      summary: List built-in configuration packs
      responses:
        "200":
          description: Registered pack summaries
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/PackETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackListResponse"
  /packs/{pack_name}/versions/{pack_version}:
    parameters:
      - $ref: "#/components/parameters/PackName"
      - $ref: "#/components/parameters/PackVersion"
    get:
      operationId: getPack
      summary: Get a versioned configuration pack metadata
      responses:
        "200":
          description: Pack metadata
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/PackETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackMetadataResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /packs/{pack_name}/versions/{pack_version}/schema:
    parameters:
      - $ref: "#/components/parameters/PackName"
      - $ref: "#/components/parameters/PackVersion"
      - $ref: "#/components/parameters/SchemaVersion"
    get:
      operationId: getPackSchema
      summary: Get a configuration pack form schema
      responses:
        "200":
          description: Versioned, declarative pack schema
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/PackETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackSchemaResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/SchemaIncompatible"
  /drafts/{environment_id}:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    get:
      operationId: getDraft
      summary: Get the targeted draft view for an environment
      responses:
        "200":
          description: Draft layers, effective configuration, and field origins for the selected environment.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/DraftETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: replaceDraftScope
      summary: Replace one targeted draft scope
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceDraftScopeInput"
      responses:
        "200":
          $ref: "#/components/responses/DraftMutationSucceeded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/DraftValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /drafts/{environment_id}:reset:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    post:
      operationId: resetDraftScope
      summary: Install an explicit empty object replacement in one draft scope
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftScopeMutationInput"
      responses:
        "200":
          $ref: "#/components/responses/DraftMutationSucceeded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /drafts/{environment_id}:discard:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    post:
      operationId: discardDraftScope
      summary: Remove one draft replacement and resolve the current source layer
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftScopeMutationInput"
      responses:
        "200":
          $ref: "#/components/responses/DraftMutationSucceeded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /drafts/{environment_id}:save:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    post:
      operationId: saveDraft
      summary: Save the current visible draft replacements to the source
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveDraftInput"
      responses:
        "200":
          description: Source was updated and the visible draft replacements were cleared
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/DraftETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/StateConflict"
        "412":
          $ref: "#/components/responses/DraftSaveRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /drafts/{environment_id}/entities:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    get:
      operationId: listDraftEntities
      summary: List effective Pack entities for an environment draft view
      parameters:
        - $ref: "#/components/parameters/EntityTypeQuery"
      responses:
        "200":
          description: Effective entities and their source, draft, and resolved presence states
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/DraftETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitiesResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createDraftEntity
      summary: Create one entity in a targeted draft scope
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntityInput"
      responses:
        "201":
          $ref: "#/components/responses/EntityMutationCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/DraftValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /drafts/{environment_id}/entities/{entity_type}/{entity_id}:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
      - $ref: "#/components/parameters/EntityType"
      - $ref: "#/components/parameters/EntityID"
    get:
      operationId: getDraftEntity
      summary: Get one effective Pack entity for an environment draft view
      responses:
        "200":
          description: Entity and its source, draft, and resolved presence states
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/DraftETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: replaceDraftEntity
      summary: Replace one entity in a targeted draft scope
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityMutationInput"
      responses:
        "200":
          $ref: "#/components/responses/EntityMutationSucceeded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/DraftValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
    delete:
      operationId: deleteDraftEntity
      summary: Delete one entity from a targeted draft scope
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityDeleteInput"
      responses:
        "200":
          $ref: "#/components/responses/EntityMutationSucceeded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/EntityReferenced"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/DraftValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /drafts/{environment_id}/entities/{entity_type}/{entity_id}/referenced-by:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
      - $ref: "#/components/parameters/EntityType"
      - $ref: "#/components/parameters/EntityID"
    get:
      operationId: getDraftEntityReferences
      summary: List effective entities that reference one entity
      responses:
        "200":
          description: Stable referenced_by entries for the requested effective entity, sorted by entity_ref
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/DraftETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityReferencesResponse"
              example:
                data:
                  entity_ref: entity:mobile-ad-monetization/v1:frequency_policy:inter_global_cap
                  referenced_by:
                    - entity_ref: entity:mobile-ad-monetization/v1:placement:ad_interstitial_001
                      entity_type: placement
                      entity_id: ad_interstitial_001
                      path: /frequency_policy_id
                meta:
                  request_id: req_01JEXAMPLE
                  revision: 12
        "404":
          $ref: "#/components/responses/NotFound"
  /drafts/{environment_id}:validate:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    post:
