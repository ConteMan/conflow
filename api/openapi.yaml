openapi: 3.1.0
info:
  title: Conflow Local API
  version: 0.6.0
  description: |
    Versioned same-origin API between the embedded React GUI and the local Go service.
servers:
  - url: /api/v1
    description: Same-origin local Conflow service
paths:
  /health:
    get:
      operationId: getHealth
      summary: Check service health and the loaded project
      responses:
        "200":
          description: Service is ready
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: The project manifest is temporarily unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /bootstrap:
    get:
      operationId: getBootstrap
      summary: Load the GUI bootstrap context
      responses:
        "200":
          description: Bootstrap context
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapResponse"
  /project:
    get:
      operationId: getProject
      summary: Get the loaded project
      responses:
        "200":
          description: Project
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
    put:
      operationId: updateProject
      summary: Replace editable project metadata
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectInput"
      responses:
        "200":
          description: Updated project
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "412":
          $ref: "#/components/responses/ManifestRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /environments:
    get:
      operationId: listEnvironments
      summary: List project environments
      responses:
        "200":
          description: Environments
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentsResponse"
    post:
      operationId: createEnvironment
      summary: Create an environment
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnvironmentInput"
      responses:
        "201":
          description: Created environment
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/StateConflict"
        "412":
          $ref: "#/components/responses/ManifestRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /environments/{environment_id}:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    get:
      operationId: getEnvironment
      summary: Get an environment
      responses:
        "200":
          description: Environment
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateEnvironment
      summary: Replace an environment without changing its ID
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEnvironmentInput"
      responses:
        "200":
          description: Updated environment
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/ManifestRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
    delete:
      operationId: deleteEnvironment
      summary: Delete an environment
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: Deleted environment ID
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEnvironmentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/StateConflict"
        "403":
          $ref: "#/components/responses/Forbidden"
        "412":
          $ref: "#/components/responses/ManifestRevisionMismatch"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /packs:
    get:
      operationId: listPacks
      summary: List built-in configuration packs
      responses:
        "200":
          description: Registered pack summaries
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/PackETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackListResponse"
  /packs/{pack_name}/versions/{pack_version}:
    parameters:
      - $ref: "#/components/parameters/PackName"
      - $ref: "#/components/parameters/PackVersion"
    get:
      operationId: getPack
      summary: Get a versioned configuration pack metadata
      responses:
        "200":
          description: Pack metadata
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/PackETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackMetadataResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /packs/{pack_name}/versions/{pack_version}/schema:
    parameters:
      - $ref: "#/components/parameters/PackName"
      - $ref: "#/components/parameters/PackVersion"
      - $ref: "#/components/parameters/SchemaVersion"
    get:
      operationId: getPackSchema
      summary: Get a configuration pack form schema
      responses:
        "200":
          description: Versioned, declarative pack schema
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/PackETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackSchemaResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/SchemaIncompatible"
  /drafts/{environment_id}:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    get:
      operationId: getDraft
      summary: Get the targeted draft view for an environment
      responses:
        "200":
          description: Draft layers, effective configuration, and field origins for the selected environment.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/DraftETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: replaceDraftScope
      summary: Replace one targeted draft scope
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceDraftScopeInput"
      responses:
        "200":
          $ref: "#/components/responses/DraftMutationSucceeded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/DraftValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /drafts/{environment_id}:reset:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    post:
      operationId: resetDraftScope
      summary: Install an explicit empty object replacement in one draft scope
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftScopeMutationInput"
      responses:
        "200":
          $ref: "#/components/responses/DraftMutationSucceeded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /drafts/{environment_id}:discard:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    post:
      operationId: discardDraftScope
      summary: Remove one draft replacement and resolve the current source layer
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftScopeMutationInput"
      responses:
        "200":
          $ref: "#/components/responses/DraftMutationSucceeded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /drafts/{environment_id}/entities:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    get:
      operationId: listDraftEntities
      summary: List effective Pack entities for an environment draft view
      parameters:
        - $ref: "#/components/parameters/EntityTypeQuery"
      responses:
        "200":
          description: Effective entities and their source, draft, and resolved presence states
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/DraftETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitiesResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createDraftEntity
      summary: Create one entity in a targeted draft scope
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntityInput"
      responses:
        "201":
          $ref: "#/components/responses/EntityMutationCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/DraftValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /drafts/{environment_id}/entities/{entity_type}/{entity_id}:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
      - $ref: "#/components/parameters/EntityType"
      - $ref: "#/components/parameters/EntityID"
    get:
      operationId: getDraftEntity
      summary: Get one effective Pack entity for an environment draft view
      responses:
        "200":
          description: Entity and its source, draft, and resolved presence states
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/DraftETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: replaceDraftEntity
      summary: Replace one entity in a targeted draft scope
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityMutationInput"
      responses:
        "200":
          $ref: "#/components/responses/EntityMutationSucceeded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/DraftValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
    delete:
      operationId: deleteDraftEntity
      summary: Delete one entity from a targeted draft scope
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityDeleteInput"
      responses:
        "200":
          $ref: "#/components/responses/EntityMutationSucceeded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/EntityReferenced"
        "412":
          $ref: "#/components/responses/DraftRevisionMismatch"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/DraftValidationFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
  /drafts/{environment_id}/entities/{entity_type}/{entity_id}/referenced-by:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
      - $ref: "#/components/parameters/EntityType"
      - $ref: "#/components/parameters/EntityID"
    get:
      operationId: getDraftEntityReferences
      summary: List effective entities that reference one entity
      responses:
        "200":
          description: Stable referenced_by entries for the requested effective entity, sorted by entity_ref
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/DraftETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityReferencesResponse"
              example:
                data:
                  entity_ref: entity:mobile-ad-monetization/v1:frequency_policy:inter_global_cap
                  referenced_by:
                    - entity_ref: entity:mobile-ad-monetization/v1:placement:ad_interstitial_001
                      entity_type: placement
                      entity_id: ad_interstitial_001
                      path: /frequency_policy_id
                meta:
                  request_id: req_01JEXAMPLE
                  revision: 12
        "404":
          $ref: "#/components/responses/NotFound"
  /drafts/{environment_id}:validate:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    post:
      operationId: validateDraft
      summary: Run and store a complete validation result for the current draft snapshot
      responses:
        "200":
          description: Complete validation result bound to the captured project-level draft revision
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/DraftETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResponse"
              example:
                data:
                  environment_id: production
                  validated_draft_revision: 12
                  validated_at: "2026-07-11T09:30:00Z"
                  status: fresh
                  readiness: blocked
                  diagnostics:
                    - code: production_unit_binding_missing
                      path: /unit_bindings/ub_production_ios_ad_native_006
                      severity: warning
                      message: Production is missing the iOS unit ID for native_document_scan_result_recommendation.
                      entity_ref: entity:mobile-ad-monetization/v1:unit_binding:ub_production_ios_ad_native_006
                      fix_suggestion: Configure a production iOS unit ID or disable the placement.
                meta:
                  request_id: req_01JEXAMPLE
                  revision: 12
        "404":
          $ref: "#/components/responses/NotFound"
  /drafts/{environment_id}/diagnostics:
    parameters:
      - $ref: "#/components/parameters/EnvironmentID"
    get:
      operationId: getDraftDiagnostics
      summary: Get the most recent complete validation result for an environment
      responses:
        "200":
          description: Most recent result; status is stale when the project-level draft revision has advanced
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/DraftETag"
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResponse"
        "404":
          description: No complete validation result has been stored for this environment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    EnvironmentID:
      name: environment_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z][a-z0-9-]{1,62}$"
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Quoted local resource revision returned by the same endpoint family. Manifest and draft revisions are distinct domains.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
    PackName:
      name: pack_name
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z][a-z0-9-]{0,62}$"
    PackVersion:
      name: pack_version
      in: path
      required: true
      schema:
        type: string
        pattern: "^v[1-9][0-9]*$"
    SchemaVersion:
      name: schema_version
      in: query
      required: false
      description: Exact schema version understood by the client. Omit to retrieve the current schema.
      schema:
        type: integer
        minimum: 1
    EntityTypeQuery:
      name: entity_type
      in: query
      required: false
      description: Optional Pack entity type filter. Omit to return every effective entity type.
      schema:
        $ref: "#/components/schemas/EntityType"
    EntityType:
      name: entity_type
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/EntityType"
    EntityID:
      name: entity_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[A-Za-z][A-Za-z0-9_-]{0,127}$"
  headers:
    CacheControl:
      schema:
        type: string
        const: no-store
    ETag:
      description: Quoted local manifest revision.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
    DraftETag:
      description: Quoted project-level draft revision shared by baseline and every environment override.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
    PackETag:
      description: Quoted in-process Pack registry revision; this is independent of the project manifest revision.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
    RequestID:
      schema:
        type: string
  responses:
    BadRequest:
      description: Malformed JSON, unknown fields, or invalid request headers.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Browser origin is not allowed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    StateConflict:
      description: Resource already exists or the current state forbids the operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ManifestRevisionMismatch:
      description: The manifest revision changed; the response contains the authoritative current manifest state from the same snapshot as the returned ETag.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/ETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ManifestRevisionMismatchResponse"
          example:
            error:
              code: revision_mismatch
              message: The project manifest changed. Review the current state before saving again.
              request_id: req_01JEXAMPLE
              current_revision: 2
              current_state:
                project:
                  id: photo-editor
                  name: Photo Editor from Git
                  pack_ref: mobile-ad-monetization/v1
                  source_type: managed-file
                environments:
                  - id: development
                    name: Development
                    kind: development
                    provider:
                      type: firebase-remote-config
                      project_id: photo-editor-dev
                    publish:
                      requires_confirmation: false
    DraftMutationSucceeded:
      description: The targeted mutation was accepted, consumed the previous ETag, and the response contains the committed draft snapshot. Accepted no-op writes also advance the project-level draft revision.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/DraftETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DraftResponse"
    DraftRevisionMismatch:
      description: The project-level draft revision or source revision changed. The ETag and complete current state come from the same atomic snapshot.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/DraftETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DraftRevisionMismatchResponse"
    DraftValidationFailed:
      description: The replacement violates the Pack structural schema, nullability, or environment override permissions.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DraftValidationErrorResponse"
    EntityMutationCreated:
      description: The targeted entity was created and the project-level draft revision advanced.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/DraftETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EntityResponse"
          example:
            data:
              entity_ref: entity:mobile-ad-monetization/v1:frequency_policy:launch_cap
              entity_type: frequency_policy
              entity_id: launch_cap
              source:
                present: false
              draft:
                present: true
                value:
                  id: launch_cap
                  fields:
                    cooldown_ms: 30000
              resolved:
                present: true
                value:
                  id: launch_cap
                  fields:
                    cooldown_ms: 30000
              effective:
                present: true
                value:
                  id: launch_cap
                  fields:
                    cooldown_ms: 30000
              origin: draft_baseline
              source_revision: src_01JEXAMPLE
            meta:
              request_id: req_01JEXAMPLE
              revision: 13
    EntityMutationSucceeded:
      description: The targeted entity mutation was accepted and the project-level draft revision advanced.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/DraftETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EntityResponse"
          example:
            data:
              entity_ref: entity:mobile-ad-monetization/v1:placement:ad_interstitial_001
              entity_type: placement
              entity_id: ad_interstitial_001
              source:
                present: true
                value:
                  id: ad_interstitial_001
                  fields:
                    frequency_policy_id: inter_global_cap
              draft:
                present: true
                value:
                  id: ad_interstitial_001
                  fields:
                    frequency_policy_id: app_open_session_gate
              resolved:
                present: true
                value:
                  id: ad_interstitial_001
                  fields:
                    frequency_policy_id: app_open_session_gate
              effective:
                present: true
                value:
                  id: ad_interstitial_001
                  fields:
                    frequency_policy_id: app_open_session_gate
              origin: draft_baseline
              source_revision: src_01JEXAMPLE
            meta:
              request_id: req_01JEXAMPLE
              revision: 14
    EntityReferenced:
      description: A restrict-deletion entity still has effective references. The typed references list is non-empty and must be used instead of parsing the message.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/DraftETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EntityReferencedErrorResponse"
          example:
            error:
              code: entity_referenced
              message: The frequency policy is still referenced by 10 placements.
              request_id: req_01JEXAMPLE
              current_revision: 12
              references:
                - entity_ref: entity:mobile-ad-monetization/v1:placement:ad_interstitial_001
                  entity_type: placement
                  entity_id: ad_interstitial_001
                  path: /frequency_policy_id
    ValidationFailed:
      description: Request is structurally valid but violates project rules.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SchemaIncompatible:
      description: The requested pack schema version is not compatible with this pack version.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnsupportedMediaType:
      description: Mutation body is not application/json.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PreconditionRequired:
      description: If-Match is required for this mutation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, project_id]
      properties:
        status:
          type: string
          const: ok
        project_id:
          type: string
    BootstrapResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/BootstrapData"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    BootstrapData:
      type: object
      additionalProperties: false
      required: [project, environments, capabilities]
      properties:
        project:
          $ref: "#/components/schemas/Project"
        environments:
          type: array
          items:
            $ref: "#/components/schemas/Environment"
        capabilities:
          $ref: "#/components/schemas/Capabilities"
    ManifestState:
      type: object
      additionalProperties: false
      required: [project, environments]
      properties:
        project:
          $ref: "#/components/schemas/Project"
        environments:
          type: array
          items:
            $ref: "#/components/schemas/Environment"
    ProjectResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Project"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    EnvironmentsResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Environment"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    EnvironmentResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Environment"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    DeleteEnvironmentResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [deleted_id]
          properties:
            deleted_id:
              type: string
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    PackListResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PackSummary"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    PackMetadataResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/PackMetadata"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    PackSchemaResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/PackSchema"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ResponseMeta:
      type: object
      additionalProperties: false
      required: [request_id, revision]
      properties:
        request_id:
          type: string
        revision:
          type: integer
          minimum: 1
    Project:
      type: object
      additionalProperties: false
      required: [id, name, pack_ref, source_type]
      properties:
        id:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,62}$"
        name:
          type: string
          minLength: 1
          maxLength: 120
        pack_ref:
          type: string
        source_type:
          type: string
          enum: [managed-file, git-json]
    UpdateProjectInput:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,62}$"
        name:
          type: string
          minLength: 1
          maxLength: 120
    Environment:
      type: object
      additionalProperties: false
      required: [id, name, kind, provider, publish]
      properties:
        id:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,62}$"
          description: Stable opaque environment identifier. It cannot be changed after creation and carries no environment semantics.
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Human-readable environment name shown in the UI.
        kind:
          $ref: "#/components/schemas/EnvironmentKind"
        provider:
          $ref: "#/components/schemas/ProviderConfig"
        publish:
          $ref: "#/components/schemas/PublishConfig"
      example:
        id: production
        name: Production
        kind: production
        provider:
          type: firebase-remote-config
          project_id: photo-editor-prod
        publish:
          requires_confirmation: true
    CreateEnvironmentInput:
      type: object
      additionalProperties: false
      required: [id, name, kind, provider, publish]
      properties:
        id:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,62}$"
        name:
          type: string
          minLength: 1
          maxLength: 120
        kind:
          $ref: "#/components/schemas/EnvironmentKind"
        provider:
          $ref: "#/components/schemas/ProviderConfig"
        publish:
          $ref: "#/components/schemas/PublishConfig"
    UpdateEnvironmentInput:
      type: object
      additionalProperties: false
      required: [name, provider, publish]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        provider:
          $ref: "#/components/schemas/ProviderConfig"
        publish:
          $ref: "#/components/schemas/PublishConfig"
    EnvironmentKind:
      type: string
      enum: [development, staging, production, custom]
      description: Server-authoritative environment category. Only production activates the persistent Production UI state. It cannot be changed after creation.
    ProviderConfig:
      type: object
      additionalProperties: false
      required: [type, project_id]
      properties:
        type:
          type: string
          const: firebase-remote-config
        project_id:
          type: string
          minLength: 1
          maxLength: 128
    PublishConfig:
      type: object
      additionalProperties: false
      required: [requires_confirmation]
      properties:
        requires_confirmation:
          type: boolean
    Capabilities:
      type: object
      additionalProperties: false
      required: [project_edit, environment_manage]
      properties:
        project_edit:
          type: boolean
          description: Whether the current project source can be edited. Clients must render project forms as read-only when false.
        environment_manage:
          type: boolean
          description: Whether environments can be created, updated, or deleted. Clients must render environment management as read-only when false.
    PackSummary:
      type: object
      additionalProperties: false
      required: [ref, name, version, description]
      properties:
        ref:
          type: string
          pattern: "^[a-z][a-z0-9-]{0,62}/v[1-9][0-9]*$"
        name:
          type: string
        version:
          type: string
        description:
          type: string
    PackMetadata:
      type: object
      additionalProperties: false
      required: [ref, name, version, description, capabilities, schema_version, entity_types]
      properties:
        ref:
          type: string
          pattern: "^[a-z][a-z0-9-]{0,62}/v[1-9][0-9]*$"
        name:
          type: string
        version:
          type: string
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
        schema_version:
          type: integer
          minimum: 1
        entity_types:
          type: array
          items:
            $ref: "#/components/schemas/EntityMetadata"
    EntityMetadata:
      type: object
      additionalProperties: false
      required: [name, label, description, id_rule, deletion_policy, environment_override_fields]
      properties:
        name:
          type: string
        label:
          type: string
        description:
          type: string
        id_rule:
          $ref: "#/components/schemas/IDRule"
        deletion_policy:
          type: string
          enum: [restrict, cascade, allow]
        environment_override_fields:
          type: array
          items:
            type: string
    IDRule:
      type: object
      additionalProperties: false
      required: [pattern, min_length, max_length]
      properties:
        pattern:
          type: string
        min_length:
          type: integer
          minimum: 1
        max_length:
          type: integer
          minimum: 1
    PackSchema:
      type: object
      additionalProperties: false
      required: [version, entities, migrations]
      properties:
        version:
          type: integer
          minimum: 1
        entities:
          type: array
          items:
            $ref: "#/components/schemas/EntitySchema"
        migrations:
          type: array
          items:
            $ref: "#/components/schemas/SchemaMigration"
    EntityType:
      type: string
      pattern: "^[a-z][a-z0-9_]{0,62}$"
      description: Pack-declared entity type. Clients treat it as opaque outside schema-driven display.
    EntityRef:
      type: string
      pattern: "^entity:[a-z][a-z0-9-]{0,62}/v[1-9][0-9]*:[a-z][a-z0-9_]{0,62}:[A-Za-z][A-Za-z0-9_-]{0,127}$"
      description: Stable opaque entity reference in entity:{pack_ref}:{entity_type}:{entity_id} format.
    EntityRecord:
      type: object
      additionalProperties: false
      required: [id, fields]
      properties:
        id:
          type: string
          pattern: "^[A-Za-z][A-Za-z0-9_-]{0,127}$"
          description: Stable entity ID. It must match the entity_id path parameter for a replacement.
        fields:
          type: object
          additionalProperties: true
          description: Complete Pack-declared entity field object. Concrete fields come from the Pack schema.
    EntityPresence:
      oneOf:
        - $ref: "#/components/schemas/MissingEntity"
        - $ref: "#/components/schemas/PresentEntity"
    MissingEntity:
      type: object
      additionalProperties: false
      required: [present]
      properties:
        present:
          type: boolean
          const: false
    PresentEntity:
      type: object
      additionalProperties: false
      required: [present, value]
      properties:
        present:
          type: boolean
          const: true
        value:
          $ref: "#/components/schemas/EntityRecord"
    EntityOrigin:
      type: string
      enum: [pack_default, baseline, draft_baseline, environment_override, draft_environment_override]
      description: Layer that supplies the entity effective value.
    EntityView:
      type: object
      additionalProperties: false
      required: [entity_ref, entity_type, entity_id, source, draft, resolved, effective, origin, source_revision]
      properties:
        entity_ref:
          $ref: "#/components/schemas/EntityRef"
        entity_type:
          $ref: "#/components/schemas/EntityType"
        entity_id:
          type: string
        source:
          $ref: "#/components/schemas/EntityPresence"
        draft:
          $ref: "#/components/schemas/EntityPresence"
        resolved:
          $ref: "#/components/schemas/EntityPresence"
        effective:
          $ref: "#/components/schemas/PresentEntity"
        origin:
          $ref: "#/components/schemas/EntityOrigin"
        source_revision:
          type: string
          minLength: 1
    EntityReference:
      type: object
      additionalProperties: false
      required: [entity_ref, entity_type, entity_id, path]
      properties:
        entity_ref:
          $ref: "#/components/schemas/EntityRef"
        entity_type:
          $ref: "#/components/schemas/EntityType"
        entity_id:
          type: string
        path:
          type: string
          description: RFC 6901 JSON Pointer inside the referencing entity.
    EntitiesResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          description: Non-null entity views sorted by entity_type and entity_id.
          items:
            $ref: "#/components/schemas/EntityView"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    EntityResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/EntityView"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    EntityReferencesData:
      type: object
      additionalProperties: false
      required: [entity_ref, referenced_by]
      properties:
        entity_ref:
          $ref: "#/components/schemas/EntityRef"
        referenced_by:
          type: array
          description: Non-null referenced_by entries sorted by entity_ref.
          items:
            $ref: "#/components/schemas/EntityReference"
    EntityReferencesResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/EntityReferencesData"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    CreateEntityInput:
      type: object
      additionalProperties: false
      required: [expected_source_revision, write_scope, entity_type, entity]
      properties:
        expected_source_revision:
          type: string
          minLength: 1
        write_scope:
          $ref: "#/components/schemas/DraftWriteScope"
        entity_type:
          $ref: "#/components/schemas/EntityType"
        entity:
          $ref: "#/components/schemas/EntityRecord"
    EntityMutationInput:
      type: object
      additionalProperties: false
      required: [expected_source_revision, write_scope, entity]
      properties:
        expected_source_revision:
          type: string
          minLength: 1
        write_scope:
          $ref: "#/components/schemas/DraftWriteScope"
        entity:
          $ref: "#/components/schemas/EntityRecord"
    EntityDeleteInput:
      type: object
      additionalProperties: false
      required: [expected_source_revision, write_scope]
      properties:
        expected_source_revision:
          type: string
          minLength: 1
        write_scope:
          $ref: "#/components/schemas/DraftWriteScope"
    EntitySchema:
      type: object
      additionalProperties: false
      required: [name, fields]
      properties:
        name:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldSchema"
    FieldSchema:
      type: object
      additionalProperties: false
      required: [name, type, required, nullable, default, sensitivity, ui, validation]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [string, boolean, integer, number, object, array, reference]
        required:
          type: boolean
        nullable:
          type: boolean
          description: Whether an explicit JSON null is a valid configured value. This is independent of required.
        default: {}
        sensitivity:
          type: string
          enum: [public, sensitive]
        ui:
          $ref: "#/components/schemas/FieldUI"
        validation:
          $ref: "#/components/schemas/FieldValidation"
    FieldUI:
      type: object
      additionalProperties: false
      required: [label, description, control, group, order]
      properties:
        label:
          type: string
        description:
          type: string
        control:
          type: string
        group:
          type: string
        order:
          type: integer
          minimum: 0
        placeholder:
          type: string
    FieldValidation:
      type: object
      additionalProperties: false
      required: [enum]
      properties:
        enum:
          type: array
          items: {}
        min_length:
          type: integer
          minimum: 0
        max_length:
          type: integer
          minimum: 0
        minimum:
          type: number
        maximum:
          type: number
    SchemaMigration:
      type: object
      additionalProperties: false
      required: [from_version, to_version, description]
      properties:
        from_version:
          type: integer
          minimum: 1
        to_version:
          type: integer
          minimum: 1
        description:
          type: string
    DraftResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/DraftView"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    DraftView:
      type: object
      additionalProperties: false
      required:
        - environment_id
        - pack_ref
        - source_revision
        - dirty
        - dirty_scopes
        - baseline
        - environment_override
        - effective
        - field_states
        - affected_environments
      properties:
        environment_id:
          type: string
          description: Environment view used to resolve environment_override. It does not make baseline environment-private.
        pack_ref:
          type: string
        source_revision:
          type: string
          minLength: 1
          description: Opaque Source Adapter snapshot revision; never used as an HTTP ETag.
        dirty:
          type: boolean
          description: Whether the shared baseline or this environment view has an installed replacement. Other environments are excluded.
        dirty_scopes:
          type: array
          description: Non-null scopes installed in this view (shared baseline and this environment only), sorted baseline before environment_override. Other environment overrides are excluded.
          uniqueItems: true
          items:
            $ref: "#/components/schemas/DraftWriteScope"
        baseline:
          $ref: "#/components/schemas/DraftLayerState"
        environment_override:
          $ref: "#/components/schemas/DraftLayerState"
        effective:
          $ref: "#/components/schemas/Configuration"
        field_states:
          type: array
          description: Non-null field states sorted by RFC 6901 path.
          items:
            $ref: "#/components/schemas/FieldState"
        affected_environments:
          type: array
          description: Non-null environments actually changed by the shared baseline and current-environment replacements represented in this view, holding other environment drafts constant, in project manifest order.
          items:
            $ref: "#/components/schemas/AffectedEnvironment"
    Configuration:
      type: object
      description: A complete configuration object for one targeted layer.
      additionalProperties: true
    ConfigurationPresence:
      oneOf:
        - $ref: "#/components/schemas/MissingConfiguration"
        - $ref: "#/components/schemas/PresentConfiguration"
    MissingConfiguration:
      type: object
      additionalProperties: false
      required: [present]
      properties:
        present:
          type: boolean
          const: false
    PresentConfiguration:
      type: object
      additionalProperties: false
      required: [present, value]
      properties:
        present:
          type: boolean
          const: true
        value:
          $ref: "#/components/schemas/Configuration"
    DraftLayerState:
      type: object
      additionalProperties: false
      required: [source, draft, resolved, dirty]
      properties:
        source:
          $ref: "#/components/schemas/ConfigurationPresence"
        draft:
          $ref: "#/components/schemas/ConfigurationPresence"
        resolved:
          $ref: "#/components/schemas/ConfigurationPresence"
        dirty:
          type: boolean
          description: Whether a replacement is installed for this targeted layer.
    FieldValuePresence:
      oneOf:
        - $ref: "#/components/schemas/MissingFieldValue"
        - $ref: "#/components/schemas/PresentFieldValue"
    MissingFieldValue:
      type: object
      additionalProperties: false
      required: [present]
      properties:
        present:
          type: boolean
          const: false
    PresentFieldValue:
      type: object
      additionalProperties: false
      required: [present, value]
      properties:
        present:
          type: boolean
          const: true
        value:
          description: Any JSON value, including null when the Pack field declares nullable true.
    FieldState:
      type: object
      additionalProperties: false
      required:
        - path
        - pack_default
        - baseline
        - draft_baseline
        - environment_override
        - draft_environment_override
        - effective
        - origin
        - environment_override_allowed
        - is_environment_overridden
        - source_revision
        - nullable
      properties:
        path:
          type: string
          description: RFC 6901 JSON Pointer. Tilde and slash tokens are escaped as ~0 and ~1.
        pack_default:
          $ref: "#/components/schemas/FieldValuePresence"
        baseline:
          $ref: "#/components/schemas/FieldValuePresence"
        draft_baseline:
          $ref: "#/components/schemas/FieldValuePresence"
        environment_override:
          $ref: "#/components/schemas/FieldValuePresence"
        draft_environment_override:
          $ref: "#/components/schemas/FieldValuePresence"
        effective:
          $ref: "#/components/schemas/FieldValuePresence"
        origin:
          $ref: "#/components/schemas/FieldOrigin"
        environment_override_allowed:
          type: boolean
        is_environment_overridden:
          type: boolean
          description: Whether the effective value comes from the source or draft environment override.
        source_revision:
          type: string
          minLength: 1
          description: Source snapshot used to produce every value in this field state.
        nullable:
          type: boolean
    FieldOrigin:
      type: string
      description: Effective value origin. Draft origins are distinct from source origins.
      enum: [pack_default, baseline, draft_baseline, environment_override, draft_environment_override]
    AffectedEnvironment:
      type: object
      additionalProperties: false
      required: [environment_id, name, kind]
      properties:
        environment_id:
          type: string
        name:
          type: string
        kind:
          $ref: "#/components/schemas/EnvironmentKind"
    DraftWriteScope:
      type: string
      enum: [baseline, environment_override]
    ReplaceDraftScopeInput:
      type: object
      additionalProperties: false
      required: [expected_source_revision, write_scope, configuration]
      properties:
        expected_source_revision:
          type: string
          minLength: 1
        write_scope:
          $ref: "#/components/schemas/DraftWriteScope"
        configuration:
          $ref: "#/components/schemas/Configuration"
    DraftScopeMutationInput:
      type: object
      additionalProperties: false
      required: [expected_source_revision, write_scope]
      properties:
        expected_source_revision:
          type: string
          minLength: 1
        write_scope:
          $ref: "#/components/schemas/DraftWriteScope"
    DraftRevisionMismatchResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          oneOf:
            - $ref: "#/components/schemas/DraftRevisionMismatchError"
            - $ref: "#/components/schemas/SourceRevisionMismatchError"
          discriminator:
            propertyName: code
            mapping:
              revision_mismatch: "#/components/schemas/DraftRevisionMismatchError"
              source_revision_mismatch: "#/components/schemas/SourceRevisionMismatchError"
    DraftRevisionMismatchError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, current_revision, current_source_revision, conflict_scope, current_state]
      properties:
        code:
          type: string
          const: revision_mismatch
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
        current_source_revision:
          type: string
          minLength: 1
        conflict_scope:
          $ref: "#/components/schemas/DraftWriteScope"
          description: Scope the failed request attempted to write; it does not identify the concurrent writer's changed scope.
        current_state:
          $ref: "#/components/schemas/DraftView"
    SourceRevisionMismatchError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, current_revision, current_source_revision, conflict_scope, current_state]
      properties:
        code:
          type: string
          const: source_revision_mismatch
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
        current_source_revision:
          type: string
          minLength: 1
        conflict_scope:
          $ref: "#/components/schemas/DraftWriteScope"
          description: Scope the failed request attempted to write; it does not identify the source change location.
        current_state:
          $ref: "#/components/schemas/DraftView"
    DraftValidationErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/DraftValidationError"
    DraftValidationError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, details]
      properties:
        code:
          type: string
          const: validation_failed
        message:
          type: string
        request_id:
          type: string
        details:
          type: array
          minItems: 1
          description: Sorted by scope, RFC 6901 path, then code.
          items:
            $ref: "#/components/schemas/DraftStructuralErrorDetail"
    DraftStructuralErrorDetail:
      type: object
      additionalProperties: false
      required: [code, path, scope, message]
      properties:
        code:
          type: string
          enum: [invalid_config_shape, field_type_mismatch, required_field_missing, value_not_allowed, explicit_null_forbidden, environment_override_forbidden]
        path:
          type: string
          description: RFC 6901 JSON Pointer to the invalid configuration field.
        entity_ref:
          $ref: "#/components/schemas/EntityRef"
          description: Present when the structural field belongs to one identifiable Pack entity; omitted for Pack-neutral or root-level errors.
        scope:
          $ref: "#/components/schemas/DraftWriteScope"
        message:
          type: string
    ValidationStatus:
      type: string
      enum: [fresh, stale]
      description: Freshness of a stored result relative to the current project-level draft revision.
    ValidationReadiness:
      type: string
      enum: [ready, blocked]
      description: Complete-validation readiness before later Plan and Provider preconditions are applied.
    DiagnosticSeverity:
      type: string
      enum: [info, warning, error, blocking]
      description: Closed severity enum. UI maps info to suggestion, warning to warning, and error or blocking to blocking.
    Diagnostic:
      type: object
      additionalProperties: false
      required: [code, path, severity, message, fix_suggestion]
      properties:
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]{0,127}$"
        path:
          type: string
          description: RFC 6901 JSON Pointer to the invalid field or entity location.
        severity:
          $ref: "#/components/schemas/DiagnosticSeverity"
        message:
          type: string
          description: Human-readable message. Clients must not parse it for behavior.
        entity_ref:
          $ref: "#/components/schemas/EntityRef"
        fix_suggestion:
          type: string
        documentation_url:
          type: string
          format: uri
    ValidationResult:
      type: object
      additionalProperties: false
      required: [environment_id, validated_draft_revision, validated_at, status, readiness, diagnostics]
      properties:
        environment_id:
          type: string
        validated_draft_revision:
          type: integer
          minimum: 1
        validated_at:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ValidationStatus"
        readiness:
          $ref: "#/components/schemas/ValidationReadiness"
        diagnostics:
          type: array
          description: Non-null diagnostics sorted by severity rank, entity_ref, path, then code.
          items:
            $ref: "#/components/schemas/Diagnostic"
    ValidationResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ValidationResult"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    EntityReferencedErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/EntityReferencedError"
    EntityReferencedError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, current_revision, references]
      properties:
        code:
          type: string
          const: entity_referenced
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
        references:
          type: array
          minItems: 1
          description: Effective references sorted by entity_ref.
          items:
            $ref: "#/components/schemas/EntityReference"
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"
    ManifestRevisionMismatchResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ManifestRevisionMismatchError"
    ManifestRevisionMismatchError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, current_revision, current_state]
      properties:
        code:
          type: string
          const: revision_mismatch
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
          description: Revision of current_state and the ETag response header.
        current_state:
          $ref: "#/components/schemas/ManifestState"
    Error:
      type: object
      additionalProperties: false
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        path:
          type: string
        code:
          type: string
        message:
          type: string
