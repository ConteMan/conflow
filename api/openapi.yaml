components:
  parameters:
    EnvironmentID:
      name: environment_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z][a-z0-9-]{1,62}$"
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Quoted local resource revision returned by the same endpoint family. Manifest and draft revisions are distinct domains.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
    PackName:
      name: pack_name
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z][a-z0-9-]{0,62}$"
    PackVersion:
      name: pack_version
      in: path
      required: true
      schema:
        type: string
        pattern: "^v[1-9][0-9]*$"
    SchemaVersion:
      name: schema_version
      in: query
      required: false
      description: Exact schema version understood by the client. Omit to retrieve the current schema.
      schema:
        type: integer
        minimum: 1
    EntityTypeQuery:
      name: entity_type
      in: query
      required: false
      description: Optional Pack entity type filter. Omit to return every effective entity type.
      schema:
        $ref: "#/components/schemas/EntityType"
    EntityType:
      name: entity_type
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/EntityType"
    EntityID:
      name: entity_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[A-Za-z][A-Za-z0-9_-]{0,127}$"
    PlanID:
      name: plan_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^plan_[A-Za-z0-9_-]{6,127}$"
    ArtifactName:
      name: artifact_name
      in: path
      required: true
      schema:
        type: string
        pattern: "^[A-Za-z0-9._-]{1,128}$"
    OperationID:
      name: operation_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^op_[A-Za-z0-9_-]{6,127}$"
    OperationIDQuery:
      name: operation_id
      in: query
      required: true
      schema:
        type: string
        pattern: "^op_[A-Za-z0-9_-]{6,127}$"
    ReleaseID:
      name: release_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^rel_[A-Za-z0-9_-]{6,127}$"
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Client-generated opaque key unique for this environment and action during the retention window.
      schema:
        type: string
        minLength: 16
        maxLength: 255
  headers:
    CacheControl:
      schema:
        type: string
        const: no-store
    ETag:
      description: Quoted local manifest revision.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
    DraftETag:
      description: Quoted project-level draft revision shared by baseline and every environment override.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
    PackETag:
      description: Quoted in-process Pack registry revision; this is independent of the project manifest revision.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
    RequestID:
      schema:
        type: string
  responses:
    BadRequest:
      description: Malformed JSON, unknown fields, or invalid request headers.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Browser origin is not allowed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    StateConflict:
      description: Resource already exists or the current state forbids the operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ManifestRevisionMismatch:
      description: The manifest revision changed; the response contains the authoritative current manifest state from the same snapshot as the returned ETag.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/ETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ManifestRevisionMismatchResponse"
          example:
            error:
              code: revision_mismatch
              message: The project manifest changed. Review the current state before saving again.
              request_id: req_01JEXAMPLE
              current_revision: 2
              current_state:
                project:
                  id: photo-editor
                  name: Photo Editor from Git
                  pack_ref: mobile-ad-monetization/v1
                  source_type: managed-file
                environments:
                  - id: development
                    name: Development
                    kind: development
                    provider:
                      type: firebase-remote-config
                      project_id: photo-editor-dev
                    publish:
                      requires_confirmation: false
    DraftMutationSucceeded:
      description: The targeted mutation was accepted, consumed the previous ETag, and the response contains the committed draft snapshot. Accepted no-op writes also advance the project-level draft revision.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/DraftETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DraftResponse"
    DraftRevisionMismatch:
      description: The project-level draft revision or source revision changed. The ETag and complete current state come from the same atomic snapshot.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/DraftETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DraftRevisionMismatchResponse"
    DraftSaveRevisionMismatch:
      description: The project-level draft revision or source revision changed while saving to the source. The ETag and complete current state come from the same atomic snapshot.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/DraftETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DraftSaveRevisionMismatchResponse"
    DraftValidationFailed:
      description: The replacement violates the Pack structural schema, nullability, or environment override permissions.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DraftValidationErrorResponse"
    EntityMutationCreated:
      description: The targeted entity was created and the project-level draft revision advanced.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/DraftETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EntityResponse"
          example:
            data:
              entity_ref: entity:mobile-ad-monetization/v1:frequency_policy:launch_cap
              entity_type: frequency_policy
              entity_id: launch_cap
              source:
                present: false
              draft:
                present: true
                value:
                  id: launch_cap
                  fields:
                    cooldown_ms: 30000
              resolved:
                present: true
                value:
                  id: launch_cap
                  fields:
                    cooldown_ms: 30000
              effective:
                present: true
                value:
                  id: launch_cap
                  fields:
                    cooldown_ms: 30000
              origin: draft_baseline
              source_revision: src_01JEXAMPLE
            meta:
              request_id: req_01JEXAMPLE
              revision: 13
    EntityMutationSucceeded:
      description: The targeted entity mutation was accepted and the project-level draft revision advanced.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/DraftETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EntityResponse"
          example:
            data:
              entity_ref: entity:mobile-ad-monetization/v1:placement:ad_interstitial_001
              entity_type: placement
              entity_id: ad_interstitial_001
              source:
                present: true
                value:
                  id: ad_interstitial_001
                  fields:
                    frequency_policy_id: inter_global_cap
              draft:
                present: true
                value:
                  id: ad_interstitial_001
                  fields:
                    frequency_policy_id: app_open_session_gate
              resolved:
                present: true
                value:
                  id: ad_interstitial_001
                  fields:
                    frequency_policy_id: app_open_session_gate
              effective:
                present: true
                value:
                  id: ad_interstitial_001
                  fields:
                    frequency_policy_id: app_open_session_gate
              origin: draft_baseline
              source_revision: src_01JEXAMPLE
            meta:
              request_id: req_01JEXAMPLE
              revision: 14
    EntityReferenced:
      description: A restrict-deletion entity still has effective references. The typed references list is non-empty and must be used instead of parsing the message.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
        ETag:
          $ref: "#/components/headers/DraftETag"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EntityReferencedErrorResponse"
    RemoteETagMismatch:
      description: Remote ETag changed; no remote update was sent.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RemoteETagMismatchResponse"
          example:
            error:
              code: entity_referenced
              message: The frequency policy is still referenced by 10 placements.
              request_id: req_01JEXAMPLE
              current_revision: 12
              references:
                - entity_ref: entity:mobile-ad-monetization/v1:placement:ad_interstitial_001
                  entity_type: placement
                  entity_id: ad_interstitial_001
                  path: /frequency_policy_id
    ValidationFailed:
      description: Request is structurally valid but violates project rules.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SchemaIncompatible:
      description: The requested pack schema version is not compatible with this pack version.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnsupportedMediaType:
      description: Mutation body is not application/json.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PreconditionRequired:
      description: If-Match is required for this mutation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, project_id]
      properties:
        status:
          type: string
          const: ok
        project_id:
          type: string
    BootstrapResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/BootstrapData"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    BootstrapData:
      type: object
      additionalProperties: false
      required: [project, environments, capabilities]
      properties:
        project:
          $ref: "#/components/schemas/Project"
        environments:
          type: array
          items:
            $ref: "#/components/schemas/Environment"
        capabilities:
          $ref: "#/components/schemas/Capabilities"
    SourceResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Source"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    SourceStatusResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/SourceStatus"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    Source:
      type: object
      additionalProperties: false
      required: [type, capabilities]
      properties:
        type:
          type: string
          enum: [managed-file, git-json]
        capabilities:
          $ref: "#/components/schemas/SourceCapabilities"
    SourceCapabilities:
      type: object
      additionalProperties: false
      required: [load, save]
      properties:
        load:
          type: boolean
        save:
          type: boolean
    SourceStatus:
      type: object
      additionalProperties: false
      required: [type, digest, external_modified, paths]
      properties:
        type:
          type: string
          enum: [managed-file, git-json]
        digest:
          type: string
          minLength: 1
          description: Opaque digest derived from canonical source bytes.
        external_modified:
          type: boolean
          description: Whether the current digest differs from the last successful source load.
        paths:
          type: array
          description: Non-null workspace-relative managed file paths. No credentials are included.
          items:
            type: string
            pattern: '^[A-Za-z0-9._/-]+$'
        git:
          $ref: "#/components/schemas/GitWorkspace"
    GitWorkspace:
      type: object
      additionalProperties: false
      required: [root, branch, dirty]
      properties:
        root:
          type: string
        branch:
          type: string
        dirty:
          type: boolean
    GitReviewStatus:
      type: object
      additionalProperties: false
      required: [root, branch, head, dirty, managed_files, changed_files, unrelated_files]
      properties:
        root:
          type: string
        branch:
          type: string
        head:
          type: string
        dirty:
          type: boolean
        managed_files:
          type: array
          items:
            type: string
        changed_files:
          type: array
          items:
            type: string
        unrelated_files:
          type: array
          items:
            type: string
    GitReviewStatusResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/GitReviewStatus"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    GitPrepareInput:
      type: object
      additionalProperties: false
      required: [environment_id]
      properties:
        environment_id:
          type: string
        slug:
          type: string
          maxLength: 120
        plan_id:
          type: string
    GitPrepareData:
      type: object
      additionalProperties: false
      required: [status, suggested_branch, commit_message, review_markdown]
      properties:
        status:
          $ref: "#/components/schemas/GitReviewStatus"
        suggested_branch:
          type: string
        commit_message:
          type: string
        review_markdown:
          type: string
    GitPrepareResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/GitPrepareData"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    GitCreateBranchInput:
      type: object
      additionalProperties: false
      required: [branch]
      properties:
        branch:
          type: string
          minLength: 1
          maxLength: 255
    GitCreateBranchData:
      type: object
      additionalProperties: false
      required: [branch]
      properties:
        branch:
          type: string
        replayed:
          type: boolean
    GitCreateBranchResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/GitCreateBranchData"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    GitCommitInput:
      type: object
      additionalProperties: false
      required: [files, message]
      properties:
        files:
          type: array
          minItems: 1
          items:
            type: string
        message:
          type: string
          minLength: 1
          maxLength: 4096
    GitCommitData:
      type: object
      additionalProperties: false
      required: [commit, files]
      properties:
        commit:
          type: string
        files:
          type: array
          items:
            type: string
        replayed:
          type: boolean
    GitCommitResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/GitCommitData"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    SourceDiagnostic:
      type: object
      additionalProperties: false
      required: [code, path, message]
      properties:
        code:
          type: string
          enum: [profile_mismatch, unmapped_value, conditional_value]
        path:
          type: string
        message:
          type: string
    SourceInspectInput:
      type: object
      additionalProperties: false
    SourceInspectData:
      type: object
      additionalProperties: false
      required: [workspace, profile_path, matched, diagnostics]
      properties:
        workspace:
          $ref: "#/components/schemas/GitWorkspace"
        profile_path:
          type: string
        matched:
          type: boolean
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/SourceDiagnostic"
    SourceInspectResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/SourceInspectData"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    SourceImportInput:
      type: object
      additionalProperties: false
      required: [environment_id, expected_source_revision]
      properties:
        environment_id:
          type: string
        expected_source_revision:
          type: string
          minLength: 1
    SourcePreviewSaveInput:
      type: object
      additionalProperties: false
      required: [environment_id]
      properties:
        environment_id:
          type: string
    SourcePreviewFile:
      type: object
      additionalProperties: false
      required: [path, diff, changed]
      properties:
        path:
          type: string
        diff:
          type: string
        changed:
          type: boolean
    SourcePreviewSaveData:
      type: object
      additionalProperties: false
      required: [source_digest, files]
      properties:
        source_digest:
          type: string
          minLength: 1
        files:
          type: array
          items:
            $ref: "#/components/schemas/SourcePreviewFile"
    SourcePreviewSaveResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/SourcePreviewSaveData"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ManifestState:
      type: object
      additionalProperties: false
      required: [project, environments]
      properties:
        project:
          $ref: "#/components/schemas/Project"
        environments:
          type: array
          items:
            $ref: "#/components/schemas/Environment"
    ProjectResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Project"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    EnvironmentsResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Environment"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    EnvironmentResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Environment"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    DeleteEnvironmentResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [deleted_id]
          properties:
            deleted_id:
              type: string
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    PackListResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PackSummary"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    PackMetadataResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/PackMetadata"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    PackSchemaResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/PackSchema"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ResponseMeta:
      type: object
      additionalProperties: false
      required: [request_id, revision]
      properties:
        request_id:
          type: string
        revision:
          type: integer
          minimum: 1
    Project:
      type: object
      additionalProperties: false
      required: [id, name, pack_ref, source_type]
      properties:
        id:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,62}$"
        name:
          type: string
          minLength: 1
          maxLength: 120
        pack_ref:
          type: string
        source_type:
          type: string
          enum: [managed-file, git-json]
        release_confirmation_policy:
          $ref: "#/components/schemas/ReleaseConfirmationPolicy"
    UpdateProjectInput:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,62}$"
        name:
          type: string
          minLength: 1
          maxLength: 120
        release_confirmation_policy:
          $ref: "#/components/schemas/ReleaseConfirmationPolicy"
    Environment:
      type: object
      additionalProperties: false
      required: [id, name, kind, provider, publish]
      properties:
        id:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,62}$"
          description: Stable opaque environment identifier. It cannot be changed after creation and carries no environment semantics.
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Human-readable environment name shown in the UI.
        kind:
          $ref: "#/components/schemas/EnvironmentKind"
        provider:
          $ref: "#/components/schemas/ProviderConfig"
        publish:
          $ref: "#/components/schemas/PublishConfig"
      example:
        id: production
        name: Production
        kind: production
        provider:
          type: firebase-remote-config
          project_id: photo-editor-prod
        publish:
          requires_confirmation: true
    CreateEnvironmentInput:
      type: object
      additionalProperties: false
      required: [id, name, kind, provider, publish]
      properties:
        id:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,62}$"
        name:
          type: string
          minLength: 1
          maxLength: 120
        kind:
          $ref: "#/components/schemas/EnvironmentKind"
        provider:
          $ref: "#/components/schemas/ProviderConfig"
        publish:
          $ref: "#/components/schemas/PublishConfig"
    UpdateEnvironmentInput:
      type: object
      additionalProperties: false
      required: [name, provider, publish]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        provider:
          $ref: "#/components/schemas/ProviderConfig"
        publish:
          $ref: "#/components/schemas/PublishConfig"
    EnvironmentKind:
      type: string
      enum: [development, staging, production, custom]
      description: Server-authoritative environment category. Only production activates the persistent Production UI state. It cannot be changed after creation.
    ProviderConfig:
      type: object
      additionalProperties: false
      required: [type, project_id]
      properties:
        type:
          type: string
          const: firebase-remote-config
        project_id:
          type: string
          minLength: 1
          maxLength: 128
    PublishConfig:
      type: object
      additionalProperties: false
      required: [requires_confirmation]
      properties:
        requires_confirmation:
          type: boolean
    Capabilities:
      type: object
      additionalProperties: false
      required: [project_edit, environment_manage]
      properties:
        project_edit:
          type: boolean
          description: Whether the current project source can be edited. Clients must render project forms as read-only when false.
        environment_manage:
          type: boolean
          description: Whether environments can be created, updated, or deleted. Clients must render environment management as read-only when false.
    PackSummary:
      type: object
      additionalProperties: false
      required: [ref, name, version, description]
      properties:
        ref:
          type: string
          pattern: "^[a-z][a-z0-9-]{0,62}/v[1-9][0-9]*$"
        name:
          type: string
        version:
          type: string
        description:
          type: string
    PackMetadata:
      type: object
      additionalProperties: false
      required: [ref, name, version, description, capabilities, schema_version, entity_types]
      properties:
        ref:
          type: string
          pattern: "^[a-z][a-z0-9-]{0,62}/v[1-9][0-9]*$"
        name:
          type: string
        version:
          type: string
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
        schema_version:
          type: integer
          minimum: 1
        entity_types:
          type: array
          items:
            $ref: "#/components/schemas/EntityMetadata"
    EntityMetadata:
      type: object
      additionalProperties: false
      required: [name, label, description, id_rule, deletion_policy, environment_override_fields]
      properties:
        name:
          type: string
        label:
          type: string
        description:
          type: string
        id_rule:
          $ref: "#/components/schemas/IDRule"
        deletion_policy:
          type: string
          enum: [restrict, cascade, allow]
        environment_override_fields:
          type: array
          items:
            type: string
    IDRule:
      type: object
      additionalProperties: false
      required: [pattern, min_length, max_length]
      properties:
        pattern:
          type: string
        min_length:
          type: integer
          minimum: 1
        max_length:
          type: integer
          minimum: 1
    PackSchema:
      type: object
      additionalProperties: false
      required: [version, entities, migrations]
      properties:
        version:
          type: integer
          minimum: 1
        entities:
          type: array
          items:
            $ref: "#/components/schemas/EntitySchema"
        migrations:
          type: array
          items:
            $ref: "#/components/schemas/SchemaMigration"
    EntityType:
      type: string
      pattern: "^[a-z][a-z0-9_]{0,62}$"
      description: Pack-declared entity type. Clients treat it as opaque outside schema-driven display.
    EntityRef:
      type: string
      pattern: "^entity:[a-z][a-z0-9-]{0,62}/v[1-9][0-9]*:[a-z][a-z0-9_]{0,62}:[A-Za-z][A-Za-z0-9_-]{0,127}$"
      description: Stable opaque entity reference in entity:{pack_ref}:{entity_type}:{entity_id} format.
    EntityRecord:
      type: object
      additionalProperties: false
      required: [id, fields]
      properties:
        id:
          type: string
          pattern: "^[A-Za-z][A-Za-z0-9_-]{0,127}$"
          description: Stable entity ID. It must match the entity_id path parameter for a replacement.
        fields:
          type: object
          additionalProperties: true
          description: Complete Pack-declared entity field object. Concrete fields come from the Pack schema.
    EntityPresence:
      oneOf:
        - $ref: "#/components/schemas/MissingEntity"
        - $ref: "#/components/schemas/PresentEntity"
    MissingEntity:
      type: object
      additionalProperties: false
      required: [present]
      properties:
        present:
          type: boolean
          const: false
    PresentEntity:
      type: object
      additionalProperties: false
      required: [present, value]
      properties:
        present:
          type: boolean
          const: true
        value:
          $ref: "#/components/schemas/EntityRecord"
    EntityOrigin:
      type: string
      enum: [pack_default, baseline, draft_baseline, environment_override, draft_environment_override]
      description: Layer that supplies the entity effective value.
    EntityView:
      type: object
      additionalProperties: false
      required: [entity_ref, entity_type, entity_id, source, draft, resolved, effective, origin, source_revision, change_status]
      properties:
        entity_ref:
          $ref: "#/components/schemas/EntityRef"
        entity_type:
          $ref: "#/components/schemas/EntityType"
        entity_id:
          type: string
        source:
          $ref: "#/components/schemas/EntityPresence"
        draft:
          $ref: "#/components/schemas/EntityPresence"
        resolved:
          $ref: "#/components/schemas/EntityPresence"
        effective:
          $ref: "#/components/schemas/PresentEntity"
        origin:
          $ref: "#/components/schemas/EntityOrigin"
        source_revision:
          type: string
          minLength: 1
        change_status:
          type: string
          enum: [unchanged, modified, created, deleted]
          description: Difference from the last successfully released entity baseline. deleted is only emitted by deletion-list read models.
    EntityReference:
      type: object
      additionalProperties: false
      required: [entity_ref, entity_type, entity_id, path]
      properties:
        entity_ref:
          $ref: "#/components/schemas/EntityRef"
        entity_type:
          $ref: "#/components/schemas/EntityType"
        entity_id:
          type: string
        path:
          type: string
          description: RFC 6901 JSON Pointer inside the referencing entity.
    EntitiesResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          description: Non-null entity views sorted by entity_type and entity_id.
          items:
            $ref: "#/components/schemas/EntityView"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    EntityResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/EntityView"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    EntityReferencesData:
      type: object
      additionalProperties: false
      required: [entity_ref, referenced_by]
      properties:
        entity_ref:
          $ref: "#/components/schemas/EntityRef"
        referenced_by:
          type: array
          description: Non-null referenced_by entries sorted by entity_ref.
          items:
            $ref: "#/components/schemas/EntityReference"
    EntityReferencesResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/EntityReferencesData"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    CreateEntityInput:
      type: object
      additionalProperties: false
      required: [expected_source_revision, write_scope, entity_type, entity]
      properties:
        expected_source_revision:
          type: string
          minLength: 1
        write_scope:
          $ref: "#/components/schemas/DraftWriteScope"
        entity_type:
          $ref: "#/components/schemas/EntityType"
        entity:
          $ref: "#/components/schemas/EntityRecord"
    EntityMutationInput:
      type: object
      additionalProperties: false
      required: [expected_source_revision, write_scope, entity]
      properties:
        expected_source_revision:
          type: string
          minLength: 1
        write_scope:
          $ref: "#/components/schemas/DraftWriteScope"
        entity:
          $ref: "#/components/schemas/EntityRecord"
    EntityDeleteInput:
      type: object
      additionalProperties: false
      required: [expected_source_revision, write_scope]
      properties:
        expected_source_revision:
          type: string
          minLength: 1
        write_scope:
          $ref: "#/components/schemas/DraftWriteScope"
    EntitySchema:
      type: object
      additionalProperties: false
      required: [name, fields]
      properties:
        name:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldSchema"
    FieldSchema:
      type: object
      additionalProperties: false
      required: [name, type, required, nullable, default, sensitivity, ui, validation]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [string, boolean, integer, number, object, array, reference]
        required:
          type: boolean
        nullable:
          type: boolean
          description: Whether an explicit JSON null is a valid configured value. This is independent of required.
        default: {}
        sensitivity:
          type: string
          enum: [public, sensitive]
        ui:
          $ref: "#/components/schemas/FieldUI"
        validation:
          $ref: "#/components/schemas/FieldValidation"
    FieldUI:
      type: object
      additionalProperties: false
      required: [label, description, control, group, order]
      properties:
        label:
          type: string
        description:
          type: string
        control:
          type: string
        group:
          type: string
        order:
          type: integer
          minimum: 0
        placeholder:
          type: string
    FieldValidation:
      type: object
      additionalProperties: false
      required: [enum]
      properties:
        enum:
          type: array
          items: {}
        min_length:
          type: integer
          minimum: 0
        max_length:
          type: integer
          minimum: 0
        minimum:
          type: number
        maximum:
          type: number
    SchemaMigration:
      type: object
      additionalProperties: false
      required: [from_version, to_version, description]
      properties:
        from_version:
          type: integer
          minimum: 1
        to_version:
          type: integer
          minimum: 1
        description:
          type: string
    DraftResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/DraftView"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    DraftView:
      type: object
      additionalProperties: false
      required:
        - environment_id
        - pack_ref
        - source_revision
        - dirty
        - changed_entity_count
        - dirty_scopes
        - baseline
        - environment_override
        - effective
        - field_states
        - affected_environments
      properties:
        environment_id:
          type: string
          description: Environment view used to resolve environment_override. It does not make baseline environment-private.
        pack_ref:
          type: string
        source_revision:
          type: string
          minLength: 1
          description: Opaque Source Adapter snapshot revision; never used as an HTTP ETag.
        dirty:
          type: boolean
          description: Whether the shared baseline or this environment view has an installed replacement. Other environments are excluded.
        changed_entity_count:
          type: integer
          minimum: 0
          description: Number of created, modified, or deleted entities compared with the last successful release.
        dirty_scopes:
          type: array
          description: Non-null scopes installed in this view (shared baseline and this environment only), sorted baseline before environment_override. Other environment overrides are excluded.
          uniqueItems: true
          items:
            $ref: "#/components/schemas/DraftWriteScope"
        baseline:
          $ref: "#/components/schemas/DraftLayerState"
        environment_override:
          $ref: "#/components/schemas/DraftLayerState"
        effective:
          $ref: "#/components/schemas/Configuration"
        field_states:
          type: array
          description: Non-null field states sorted by RFC 6901 path.
          items:
            $ref: "#/components/schemas/FieldState"
        affected_environments:
          type: array
          description: Non-null environments actually changed by the shared baseline and current-environment replacements represented in this view, holding other environment drafts constant, in project manifest order.
          items:
            $ref: "#/components/schemas/AffectedEnvironment"
    Configuration:
      type: object
      description: A complete configuration object for one targeted layer.
      additionalProperties: true
    ConfigurationPresence:
      oneOf:
        - $ref: "#/components/schemas/MissingConfiguration"
        - $ref: "#/components/schemas/PresentConfiguration"
    MissingConfiguration:
      type: object
      additionalProperties: false
      required: [present]
      properties:
        present:
          type: boolean
          const: false
    PresentConfiguration:
      type: object
      additionalProperties: false
      required: [present, value]
      properties:
        present:
          type: boolean
          const: true
        value:
          $ref: "#/components/schemas/Configuration"
    DraftLayerState:
      type: object
      additionalProperties: false
      required: [source, draft, resolved, dirty]
      properties:
        source:
          $ref: "#/components/schemas/ConfigurationPresence"
        draft:
          $ref: "#/components/schemas/ConfigurationPresence"
        resolved:
          $ref: "#/components/schemas/ConfigurationPresence"
        dirty:
          type: boolean
          description: Whether a replacement is installed for this targeted layer.
    FieldValuePresence:
      oneOf:
        - $ref: "#/components/schemas/MissingFieldValue"
        - $ref: "#/components/schemas/PresentFieldValue"
    MissingFieldValue:
      type: object
      additionalProperties: false
      required: [present]
      properties:
        present:
          type: boolean
          const: false
    PresentFieldValue:
      type: object
      additionalProperties: false
      required: [present, value]
      properties:
        present:
          type: boolean
          const: true
        value:
          description: Any JSON value, including null when the Pack field declares nullable true.
    FieldState:
      type: object
      additionalProperties: false
      required:
        - path
        - pack_default
        - baseline
        - draft_baseline
        - environment_override
        - draft_environment_override
        - effective
        - origin
        - environment_override_allowed
        - is_environment_overridden
        - source_revision
        - nullable
      properties:
        path:
          type: string
          description: RFC 6901 JSON Pointer. Tilde and slash tokens are escaped as ~0 and ~1.
        pack_default:
          $ref: "#/components/schemas/FieldValuePresence"
        baseline:
          $ref: "#/components/schemas/FieldValuePresence"
        draft_baseline:
          $ref: "#/components/schemas/FieldValuePresence"
        environment_override:
          $ref: "#/components/schemas/FieldValuePresence"
        draft_environment_override:
          $ref: "#/components/schemas/FieldValuePresence"
        effective:
          $ref: "#/components/schemas/FieldValuePresence"
        origin:
          $ref: "#/components/schemas/FieldOrigin"
        environment_override_allowed:
          type: boolean
        is_environment_overridden:
          type: boolean
          description: Whether the effective value comes from the source or draft environment override.
        source_revision:
          type: string
          minLength: 1
          description: Source snapshot used to produce every value in this field state.
        nullable:
          type: boolean
    FieldOrigin:
      type: string
      description: Effective value origin. Draft origins are distinct from source origins.
      enum: [pack_default, baseline, draft_baseline, environment_override, draft_environment_override]
    AffectedEnvironment:
      type: object
      additionalProperties: false
      required: [environment_id, name, kind]
      properties:
        environment_id:
          type: string
        name:
          type: string
        kind:
          $ref: "#/components/schemas/EnvironmentKind"
    DraftWriteScope:
      type: string
      enum: [baseline, environment_override]
    ReplaceDraftScopeInput:
      type: object
      additionalProperties: false
      required: [expected_source_revision, write_scope, configuration]
      properties:
        expected_source_revision:
          type: string
          minLength: 1
        write_scope:
          $ref: "#/components/schemas/DraftWriteScope"
        configuration:
          $ref: "#/components/schemas/Configuration"
    DraftScopeMutationInput:
      type: object
      additionalProperties: false
      required: [expected_source_revision, write_scope]
      properties:
        expected_source_revision:
          type: string
          minLength: 1
        write_scope:
          $ref: "#/components/schemas/DraftWriteScope"
    SaveDraftInput:
      type: object
      additionalProperties: false
      required: [expected_source_revision]
      properties:
        expected_source_revision:
          type: string
          minLength: 1
          description: The source revision observed with the current draft. It is independent of If-Match.
    DraftRevisionMismatchResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          oneOf:
            - $ref: "#/components/schemas/DraftRevisionMismatchError"
            - $ref: "#/components/schemas/SourceRevisionMismatchError"
          discriminator:
            propertyName: code
            mapping:
              revision_mismatch: "#/components/schemas/DraftRevisionMismatchError"
              source_revision_mismatch: "#/components/schemas/SourceRevisionMismatchError"
    DraftSaveRevisionMismatchResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          oneOf:
            - $ref: "#/components/schemas/DraftSaveRevisionMismatchError"
            - $ref: "#/components/schemas/DraftSaveSourceRevisionMismatchError"
          discriminator:
            propertyName: code
            mapping:
              revision_mismatch: "#/components/schemas/DraftSaveRevisionMismatchError"
              source_revision_mismatch: "#/components/schemas/DraftSaveSourceRevisionMismatchError"
    DraftSaveRevisionMismatchError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, current_revision, current_source_revision, conflict_scope, current_state]
      properties:
        code:
          type: string
          const: revision_mismatch
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
        current_source_revision:
          type: string
          minLength: 1
        conflict_scope:
          type: string
          const: source
        current_state:
          $ref: "#/components/schemas/DraftView"
    DraftSaveSourceRevisionMismatchError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, current_revision, current_source_revision, conflict_scope, current_state]
      properties:
        code:
          type: string
          const: source_revision_mismatch
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
        current_source_revision:
          type: string
          minLength: 1
        conflict_scope:
          type: string
          const: source
        current_state:
          $ref: "#/components/schemas/DraftView"
    DraftRevisionMismatchError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, current_revision, current_source_revision, conflict_scope, current_state]
      properties:
        code:
          type: string
          const: revision_mismatch
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
        current_source_revision:
          type: string
          minLength: 1
        conflict_scope:
          $ref: "#/components/schemas/DraftWriteScope"
          description: Scope the failed request attempted to write; it does not identify the concurrent writer's changed scope.
        current_state:
          $ref: "#/components/schemas/DraftView"
    SourceRevisionMismatchError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, current_revision, current_source_revision, conflict_scope, current_state]
      properties:
        code:
          type: string
          const: source_revision_mismatch
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
        current_source_revision:
          type: string
          minLength: 1
        conflict_scope:
          $ref: "#/components/schemas/DraftWriteScope"
          description: Scope the failed request attempted to write; it does not identify the source change location.
        current_state:
          $ref: "#/components/schemas/DraftView"
    DraftValidationErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/DraftValidationError"
    DraftValidationError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, details]
      properties:
        code:
          type: string
          const: validation_failed
        message:
          type: string
        request_id:
          type: string
        details:
          type: array
          minItems: 1
          description: Sorted by scope, RFC 6901 path, then code.
          items:
            $ref: "#/components/schemas/DraftStructuralErrorDetail"
    DraftStructuralErrorDetail:
      type: object
      additionalProperties: false
      required: [code, path, scope, message]
      properties:
        code:
          type: string
          enum: [invalid_config_shape, field_type_mismatch, required_field_missing, value_not_allowed, explicit_null_forbidden, environment_override_forbidden]
        path:
          type: string
          description: RFC 6901 JSON Pointer to the invalid configuration field.
        entity_ref:
          $ref: "#/components/schemas/EntityRef"
          description: Present when the structural field belongs to one identifiable Pack entity; omitted for Pack-neutral or root-level errors.
        scope:
          $ref: "#/components/schemas/DraftWriteScope"
        message:
          type: string
    ValidationStatus:
      type: string
      enum: [fresh, stale]
      description: Freshness of a stored result relative to the current project-level draft revision.
    ValidationReadiness:
      type: string
      enum: [ready, blocked]
      description: Complete-validation readiness before later Plan and Provider preconditions are applied.
    DiagnosticSeverity:
      type: string
      enum: [info, warning, error, blocking]
      description: Closed severity enum. UI maps info to suggestion, warning to warning, and error or blocking to blocking.
    Diagnostic:
      type: object
      additionalProperties: false
      required: [code, path, severity, message, fix_suggestion]
      properties:
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]{0,127}$"
        path:
          type: string
          description: RFC 6901 JSON Pointer to the invalid field or entity location.
        severity:
          $ref: "#/components/schemas/DiagnosticSeverity"
        message:
          type: string
          description: Human-readable message. Clients must not parse it for behavior.
        entity_ref:
          $ref: "#/components/schemas/EntityRef"
        fix_suggestion:
          type: string
        documentation_url:
          type: string
          format: uri
    ValidationResult:
      type: object
      additionalProperties: false
      required: [environment_id, validated_draft_revision, validated_at, status, readiness, diagnostics]
      properties:
        environment_id:
          type: string
        validated_draft_revision:
          type: integer
          minimum: 1
        validated_at:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ValidationStatus"
        readiness:
          $ref: "#/components/schemas/ValidationReadiness"
        diagnostics:
          type: array
          description: Non-null diagnostics sorted by severity rank, entity_ref, path, then code.
          items:
            $ref: "#/components/schemas/Diagnostic"
    ValidationResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ValidationResult"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    EntityReferencedErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/EntityReferencedError"
    EntityReferencedError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, current_revision, references]
      properties:
        code:
          type: string
          const: entity_referenced
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
        references:
          type: array
          minItems: 1
          description: Effective references sorted by entity_ref.
          items:
            $ref: "#/components/schemas/EntityReference"
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"
    ManifestRevisionMismatchResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ManifestRevisionMismatchError"
    ManifestRevisionMismatchError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, current_revision, current_state]
      properties:
        code:
          type: string
          const: revision_mismatch
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
          description: Revision of current_state and the ETag response header.
        current_state:
          $ref: "#/components/schemas/ManifestState"
    Error:
      type: object
      additionalProperties: false
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        current_revision:
          type: integer
          minimum: 1
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        path:
          type: string
        code:
          type: string
        message:
          type: string
    ReleaseConfirmationPolicy:
      type: object
      additionalProperties: false
      required: [production_low_risk_mode]
      properties:
        production_low_risk_mode:
          type: string
          enum: [environment_id, acknowledgement]
          description: Project-level policy that can only relax the environment ID input for low-risk Production Plans.
      example:
        production_low_risk_mode: environment_id
    OperationStatus:
      type: string
      enum: [pending, running, succeeded, failed, cancelled]
    OperationStage:
      type: string
      enum: [queued, reading_remote, snapshotting, compiling, analyzing, validating_remote, submitting, verifying, recording_audit, completed, cancelled]
    OperationType:
      type: string
      enum: [provider_connect, remote_pull, remote_validate, plan, publish, rollback_preview, rollback]
    RemoteState:
      type: string
      enum: [unchanged, changed, unknown]
      description: Whether the Operation changed the remote provider state. Unknown requires an explicit remote verification.
    OperationFailure:
      type: object
      additionalProperties: false
      required: [code, message, retryable, stage]
      properties:
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]{0,127}$"
        message:
          type: string
        retryable:
          type: boolean
        stage:
          $ref: "#/components/schemas/OperationStage"
    OperationResult:
      type: object
      additionalProperties: false
      required: [resource_type, resource_id, href]
      properties:
        resource_type:
          type: string
          enum: [plan, remote_snapshot, release, rollback_preview]
        resource_id:
          type: string
        href:
          type: string
          pattern: "^/api/v1/"
    Operation:
      type: object
      additionalProperties: false
      required: [operation_id, operation_type, status, stage, remote_state, created_at, updated_at]
      properties:
        operation_id:
          type: string
          pattern: "^op_[A-Za-z0-9_-]{6,127}$"
        operation_type:
          $ref: "#/components/schemas/OperationType"
        status:
          $ref: "#/components/schemas/OperationStatus"
        stage:
          $ref: "#/components/schemas/OperationStage"
        remote_state:
          $ref: "#/components/schemas/RemoteState"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        failure:
          $ref: "#/components/schemas/OperationFailure"
        result:
          $ref: "#/components/schemas/OperationResult"
    OperationResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Operation"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    RemoteSummary:
      type: object
      additionalProperties: false
      required: [parameter_count, managed_parameter_count, condition_count, content_digest]
      properties:
        parameter_count:
          type: integer
          minimum: 0
        managed_parameter_count:
          type: integer
          minimum: 0
        condition_count:
          type: integer
          minimum: 0
        content_digest:
          type: string
    RemoteSnapshot:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [available, unavailable]
        remote_etag:
          type: string
        version:
          type: string
        observed_at:
          type: string
          format: date-time
        summary:
          $ref: "#/components/schemas/RemoteSummary"
        unavailable_reason:
          type: string
          enum: [provider_unavailable, provider_unauthorized, remote_snapshot_missing, provider_capability_unavailable]
    PlanStatus:
      type: string
      enum: [ready, preview_only, invalidated, expired]
    PlanInvalidationReason:
      type: string
      enum: [draft_revision_changed, source_digest_changed, remote_etag_changed, remote_snapshot_unavailable, ttl_expired, provider_capability_changed]
    PlanChangeKind:
      type: string
      enum: [created, updated, deleted, overridden]
    PlanNodeID:
      type: string
      pattern: "^node_[A-Za-z0-9_-]{6,127}$"
    SemanticChange:
      type: object
      additionalProperties: false
      required: [node_id, change_kind, summary, affected_entity_node_ids, remote_parameter_node_ids]
      properties:
        node_id:
          $ref: "#/components/schemas/PlanNodeID"
        change_kind:
          $ref: "#/components/schemas/PlanChangeKind"
        summary:
          type: string
        direct_entity_ref:
          $ref: "#/components/schemas/EntityRef"
        field_path:
          type: string
          description: RFC 6901 path within direct_entity_ref when one field caused the change.
        before_summary:
          type: string
        after_summary:
          type: string
        affected_entity_ids:
          type: array
          items:
            $ref: "#/components/schemas/EntityRef"
        affected_entity_node_ids:
          type: array
          items:
            $ref: "#/components/schemas/PlanNodeID"
        remote_parameter_node_ids:
          type: array
          items:
            $ref: "#/components/schemas/PlanNodeID"
    AffectedEntity:
      type: object
      additionalProperties: false
      required: [node_id, entity_ref, entity_type, entity_id, impact_kind, caused_by_semantic_change_ids]
      properties:
        node_id:
          $ref: "#/components/schemas/PlanNodeID"
        entity_ref:
          $ref: "#/components/schemas/EntityRef"
        entity_type:
          $ref: "#/components/schemas/EntityType"
        entity_id:
          type: string
        impact_kind:
          type: string
          enum: [direct, inherited, referenced, compiled]
        caused_by_semantic_change_ids:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PlanNodeID"
    RemoteParameterChange:
      type: object
      additionalProperties: false
      required: [node_id, parameter_key, change_kind, managed, caused_by_semantic_change_ids, affected_entity_node_ids]
      properties:
        node_id:
          $ref: "#/components/schemas/PlanNodeID"
        parameter_key:
          type: string
        change_kind:
          $ref: "#/components/schemas/PlanChangeKind"
        before_summary:
          type: string
        after_summary:
          type: string
        managed:
          type: boolean
        projection_id:
          type: string
        caused_by_semantic_change_ids:
          type: array
          items:
            $ref: "#/components/schemas/PlanNodeID"
        affected_entity_node_ids:
          type: array
          items:
            $ref: "#/components/schemas/PlanNodeID"
    PlanArtifactMetadata:
      type: object
      additionalProperties: false
      required: [artifact_name, media_type, content_digest, size_bytes, sensitive, available]
      properties:
        artifact_name:
          type: string
        media_type:
          type: string
        content_digest:
          type: string
        size_bytes:
          type: integer
          minimum: 0
        sensitive:
          type: boolean
        available:
          type: boolean
    RiskSeverity:
      type: string
      enum: [low, medium, high, blocking]
    RiskItem:
      type: object
      additionalProperties: false
      required: [risk_item_id, severity, reason_code, summary, semantic_change_ids, remote_parameter_node_ids, acknowledgement_required]
      properties:
